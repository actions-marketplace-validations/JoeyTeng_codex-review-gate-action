name: Codex Review Gate
description: Gate a pull request on a controlled Codex review signal.
author: JoeyTeng

inputs:
  github-token:
    description: Token used to read PR review state, create comments, and write commit statuses.
    required: true
  pull-request:
    description: Pull request number to gate.
    required: false
    default: ""
  head-sha:
    description: Deprecated compatibility input. Event-driven runs load the current PR head from GitHub.
    required: false
    default: ""
  status-context:
    description: Commit status context written by the gate.
    required: false
    default: "codex/review-gate"
  state-marker:
    description: Hidden HTML marker used for the sticky state comment.
    required: false
    default: "codex-review-gate-state"
  marker-comment-marker:
    description: Hidden HTML marker used for controlled Codex request comments.
    required: false
    default: "codex-review-gate-marker"
  max-wait-seconds:
    description: Overall maximum wait time before failing closed.
    required: false
    default: "7200"
  marker-timeout-seconds:
    description: Time to wait for a controlled marker before marking it stalled and retrying.
    required: false
    default: "3600"
  marker-ack-timeout-seconds:
    description: Initial time to wait for Codex to acknowledge a marker before retrying.
    required: false
    default: "300"
  marker-ack-timeout-max-seconds:
    description: Maximum exponential backoff wait for unacknowledged markers.
    required: false
    default: "1800"
  completion-signal-buffer-seconds:
    description: Minimum seconds after a marker before accepting a Codex top-level clean completion comment.
    required: false
    default: "30"
  failed-findings-recovery:
    description: Allow a later Codex clean completion comment to recover from resolved failed findings.
    required: false
    default: ""
  failed-findings-recovery-mode:
    description: "Failed findings recovery mode. Use head or fresh."
    required: false
    default: ""
  poll-interval-seconds:
    description: Deprecated compatibility input. Event-driven runs do not poll.
    required: false
    default: "30"
  bootstrap-grace-seconds:
    description: Deprecated compatibility input. Event-driven runs create controlled markers directly.
    required: false
    default: "60"
  bootstrap-timeout-seconds:
    description: Deprecated compatibility input. Bootstrap now closes after the grace period and starts a controlled marker.
    required: false
    default: "3600"
  codex-bot-logins:
    description: Comma-separated GitHub logins accepted as Codex bot identities.
    required: false
    default: "chatgpt-codex-connector,chatgpt-codex-connector[bot]"
  trusted-comment-logins:
    description: Comma-separated GitHub logins trusted for gate state and marker comments.
    required: false
    default: "github-actions[bot]"
  event-mode:
    description: "Event processing mode: standard, comment-only, or full."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run Codex review gate
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_API_URL: ${{ github.api_url }}
        PR_NUMBER: ${{ inputs.pull-request }}
        HEAD_SHA: ${{ inputs.head-sha }}
        STATUS_CONTEXT: ${{ inputs.status-context }}
        STATE_MARKER: ${{ inputs.state-marker }}
        MARKER_COMMENT: ${{ inputs.marker-comment-marker }}
        MAX_WAIT_SECONDS: ${{ inputs.max-wait-seconds }}
        MARKER_TIMEOUT_SECONDS: ${{ inputs.marker-timeout-seconds }}
        MARKER_ACK_TIMEOUT_SECONDS: ${{ inputs.marker-ack-timeout-seconds }}
        MARKER_ACK_TIMEOUT_MAX_SECONDS: ${{ inputs.marker-ack-timeout-max-seconds }}
        COMPLETION_SIGNAL_BUFFER_SECONDS: ${{ inputs.completion-signal-buffer-seconds }}
        FAILED_FINDINGS_RECOVERY_INPUT: ${{ inputs.failed-findings-recovery }}
        FAILED_FINDINGS_RECOVERY_MODE_INPUT: ${{ inputs.failed-findings-recovery-mode }}
        POLL_INTERVAL_SECONDS: ${{ inputs.poll-interval-seconds }}
        BOOTSTRAP_GRACE_SECONDS: ${{ inputs.bootstrap-grace-seconds }}
        BOOTSTRAP_TIMEOUT_SECONDS: ${{ inputs.bootstrap-timeout-seconds }}
        EVENT_MODE_INPUT: ${{ inputs.event-mode }}
        CODEX_BOT_LOGINS: ${{ inputs.codex-bot-logins }}
        TRUSTED_COMMENT_LOGINS: ${{ inputs.trusted-comment-logins }}
      run: node "$GITHUB_ACTION_PATH/src/gate.mjs"
